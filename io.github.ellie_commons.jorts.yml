id: io.github.ellie_commons.jorts
# elementary SDK is not available on Flathub, so use the elementary BaseApp instead
base: io.elementary.BaseApp
base-version: circe-25.08
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: io.github.ellie_commons.jorts

finish-args:
  - --share=ipc
  - --device=dri
  - --socket=fallback-x11
  - --socket=wayland

cleanup:
  - /include
  - /lib/girepository-1.0
  - /lib/pkgconfig
  - /share/gir-1.0
  - /share/vala

# Cleanup development-related files inherited from the BaseApp to reduce package size of your app.
cleanup-commands:
  - /app/cleanup-BaseApp.sh

modules:
  - name: jorts
    buildsystem: meson
    config-opts:
      - --buildtype=release
      - -Dlegacy_rdnn=true
      - -Dicon_variant=default
    sources:
      - type: git
        url: https://github.com/elly-code/jorts.git
        tag: 4.3.0
        commit: 1b0d174f2be33a1c9836debbd8dfd821aeaaa78b
        x-checker-data:
          type: git
          tag-pattern: '^([\d.]+)$'
